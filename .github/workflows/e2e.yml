# Playwright E2E — smoke + auth/chat on chromium (CI scope).
# Authenticated checkout/pro-gating projects run locally via `npm run test:e2e:local`.
name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs on the same branch/PR.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright — chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      # Playwright config skips webServer when this is set; we start prod manually below.
      E2E_NO_WEBSERVER: "1"
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_LOCALE: cs
      # Optional repository secrets — enable auth setup + API probes in preflight.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTH_DEV_REGISTER: ${{ secrets.AUTH_DEV_REGISTER }}
      # Required for `npm run start:prod` (instrumentation asserts Upstash in production).
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Isolate CI rate-limit keys from production Upstash counters.
      RATE_LIMIT_PREFIX: payguard:e2e:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pin cache key to the installed @playwright/test version.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build application
        run: npm run build

      # Preflight + tests must share this step with the background server.
      # GitHub Actions kills background processes when a step ends.
      - name: Start server and run E2E (chromium)
        run: |
          npm run start:prod > server.log 2>&1 &
          npm run test:e2e:local -- --project=chromium

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
