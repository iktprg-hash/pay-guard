# Playwright E2E — full suite (smoke, auth, checkout, pro-gating) on chromium + mobile.
name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs on the same branch/PR.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright — full suite
    runs-on: ubuntu-latest
    timeout-minutes: 50

    env:
      CI: true
      E2E_NO_WEBSERVER: "1"
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_LOCALE: cs
      # Optional repository secrets — enable auth setup + API probes in preflight.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTH_DEV_REGISTER: ${{ secrets.AUTH_DEV_REGISTER }}
      # Required for `npm run start:prod` (instrumentation asserts Upstash in production).
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Isolate CI rate-limit keys from production Upstash counters.
      RATE_LIMIT_PREFIX: payguard:e2e:ci
      # Checkout E2E skips when unset; set secrets to exercise mocked billing in CI.
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build application
        run: npm run build

      # Playwright retries: 3 in CI (playwright.config.ts). Preflight probes /api/health + key routes.
      - name: Start server and run E2E
        run: npm run test:e2e:ci

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload server log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-server-log
          path: server.log
          retention-days: 7
          if-no-files-found: ignore
