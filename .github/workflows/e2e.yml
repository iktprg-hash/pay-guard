name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright — chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      E2E_NO_WEBSERVER: "1"
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_LOCALE: cs
      # Optional — add repository secrets for full auth/API coverage in CI
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTH_DEV_REGISTER: ${{ secrets.AUTH_DEV_REGISTER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build application
        run: npm run build

      - name: Start production server
        run: npm run start:prod &

      - name: E2E preflight (health + routes)
        run: npm run test:e2e:preflight

      - name: Run Playwright E2E (chromium only)
        run: npm run test:e2e -- --project=chromium

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results-chromium
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
